# Generated by ontology/discover.py - edit this draft, add competency questions,
# then save as ontology/schema/v001.yaml and commit.
version: v001-draft
description: 'Draft schema: deterministic column seed + LLM narrative discovery. Human-edit, add competency
  questions, save as schema/v001.yaml, commit.'
node_types:
- label: Incident
  description: One canonical crash incident (one row of the treated table after Same-Incident dedupe).
  provenance: column
  properties:
  - name: incident_key
    type: STRING
    description: 'source: Same Incident ID, Report ID'
    required: true
  - name: report_id
    type: STRING
    description: 'source: Report ID'
    required: false
  - name: incident_date
    type: DATE
    description: 'source: incident_date'
    required: false
  - name: incident_time
    type: STRING
    description: 'source: Incident Time (24:00)'
    required: false
  - name: highest_injury_severity
    type: STRING
    description: 'source: Highest Injury Severity Alleged'
    required: false
  - name: crash_with
    type: STRING
    description: 'source: Crash With'
    required: false
- label: Vehicle
  description: A vehicle involved in the incident. The subject (ADS/ADAS) vehicle is seeded from columns;
    crash-partner vehicles come from CP columns or the narrative.
  provenance: column
  properties:
  - name: vehicle_key
    type: STRING
    description: 'source: VIN, Same Incident ID'
    required: true
  - name: vin
    type: STRING
    description: 'source: VIN'
    required: false
  - name: make
    type: STRING
    description: 'source: Make Clean'
    required: false
  - name: model
    type: STRING
    description: 'source: Model Clean'
    required: false
  - name: model_year
    type: STRING
    description: 'source: Model Year'
    required: false
  - name: mileage
    type: STRING
    description: 'source: Mileage'
    required: false
  - name: automation_system_type
    type: STRING
    description: 'source: automation_system_type'
    required: false
  - name: automation_engaged
    type: STRING
    description: 'source: automation_engaged_clean'
    required: false
  - name: precrash_speed_mph
    type: FLOAT
    description: 'source: sv_precrash_speed_mph'
    required: false
  - name: precrash_movement
    type: STRING
    description: 'source: SV Pre-Crash Movement, CP Pre-Crash Movement'
    required: false
  - name: is_subject_vehicle
    type: BOOLEAN
    description: 'source: VIN'
    required: false
- label: Company
  description: Operating / reporting entity, canonicalized to master_entity.
  provenance: column
  properties:
  - name: name
    type: STRING
    description: 'source: master_entity'
    required: true
  - name: reporting_entity
    type: STRING
    description: 'source: Reporting Entity'
    required: false
- label: Location
  description: 'Where the incident occurred: place plus roadway context.'
  provenance: column
  properties:
  - name: location_key
    type: STRING
    description: 'source: Same Incident ID, Report ID'
    required: true
  - name: city
    type: STRING
    description: 'source: City'
    required: false
  - name: state
    type: STRING
    description: 'source: State'
    required: false
  - name: zip_code
    type: STRING
    description: 'source: Zip Code'
    required: false
  - name: roadway_type
    type: STRING
    description: 'source: Roadway Type'
    required: false
  - name: roadway_surface
    type: STRING
    description: 'source: Roadway Surface'
    required: false
  - name: roadway_description
    type: STRING
    description: 'source: Roadway Description'
    required: false
  - name: posted_speed_limit_mph
    type: STRING
    description: 'source: Posted Speed Limit (MPH)'
    required: false
- label: EnvironmentalCondition
  description: A weather / lighting / roadway condition present at the incident (one node per condition
    value, shared across incidents).
  provenance: column
  properties:
  - name: name
    type: STRING
    description: 'source: weather_clear_clean, weather_rain_clean, Lighting'
    required: true
  - name: category
    type: STRING
    description: 'source: weather_clear_clean, roadway_wet_surface_clean, Lighting'
    required: false
- label: Automateddrivingsystem
  description: Autonomous Driving System or automation level engaged during the incident (discovered in
    46 narratives; e.g. "Level 4 ADS was engaged in autonomous mode")
  provenance: narrative
  properties: []
- label: Collisiontype
  description: The type or nature of collision impact (discovered in 8 narratives; e.g. "reversed into
    the left rear bumper")
  provenance: narrative
  properties: []
- label: Crosswalk
  description: Designated pedestrian crossing areas on roadways (discovered in 9 narratives; e.g. "pedestrian
    crosswalk")
  provenance: narrative
  properties: []
- label: Damage
  description: Physical damage to a vehicle resulting from an incident (discovered in 24 narratives; e.g.
    "damage to the rear window")
  provenance: narrative
  properties: []
- label: Direction
  description: The heading or compass direction of vehicle travel (discovered in 17 narratives; e.g. "traveling
    northbound")
  provenance: narrative
  properties: []
- label: Impactlocation
  description: The specific part or region of a vehicle where physical contact occurred (discovered in
    9 narratives; e.g. "front of the passenger car made contact with the rear of the stationary Waymo
    AV")
  provenance: narrative
  properties: []
- label: Injuryseverity
  description: The medical outcome or injury status of a person involved in the incident (discovered in
    8 narratives; e.g. "transported to the hospital")
  provenance: narrative
  properties: []
- label: Lane
  description: A specific lane or traffic lane on a roadway, identified by position and direction (discovered
    in 55 narratives; e.g. "rightmost dedicated left turn lane on into lane three of three lanes in the
    northbound direction")
  provenance: narrative
  properties: []
- label: Laneposition
  description: A specific position or location within a traffic lane (discovered in 18 narratives; e.g.
    "third from the right lane")
  provenance: narrative
  properties: []
- label: Maneuver
  description: An action or movement performed by a vehicle (discovered in 37 narratives; e.g. "began
    to change lanes to the right")
  provenance: narrative
  properties: []
- label: Operator
  description: A person operating a vehicle, including test drivers and autonomous system operators (discovered
    in 11 narratives; e.g. "a test driver was operating the Waymo AV in manual mode")
  provenance: narrative
  properties: []
- label: Passenger
  description: A person traveling in a vehicle (discovered in 25 narratives; e.g. "a passenger in the
    Waymo AV opened the rear left door")
  provenance: narrative
  properties: []
- label: Pedestrian
  description: A person traveling on foot (discovered in 39 narratives; e.g. "a pedestrian that had begun
    crossing the roadway from the east side")
  provenance: narrative
  properties: []
- label: Person
  description: Individuals involved in or affected by incidents (discovered in 24 narratives; e.g. "individual
    involved was transported from the scene to a hospital")
  provenance: narrative
  properties: []
- label: Regulatoryreport
  description: Official regulatory reporting requirement or framework (discovered in 17 narratives; e.g.
    "Standing General Order 2021-01")
  provenance: narrative
  properties: []
- label: Regulatoryrequirement
  description: A rule or order requiring incident reporting or data submission (discovered in 19 narratives;
    e.g. "Request No. 2 of Standing General Order 2021-01")
  provenance: narrative
  properties: []
- label: Roadfeature
  description: Physical structures in the environment that vehicles interact with (e.g., gates, tracks)
    (discovered in 18 narratives; e.g. "elevated gate track")
  provenance: narrative
  properties: []
- label: Safetyfeature
  description: Equipment or systems designed to enhance safety (discovered in 12 narratives; e.g. "hazard
    lights")
  provenance: narrative
  properties: []
- label: Testdriver
  description: Human operator present in an autonomous vehicle (discovered in 11 narratives; e.g. "test
    driver was present (in the driver's seating position)")
  provenance: narrative
  properties: []
- label: Trafficcontrol
  description: Traffic signals and control mechanisms that regulate vehicle movement (discovered in 93
    narratives; e.g. "red light")
  provenance: narrative
  properties: []
- label: Vehiclecontact
  description: The specific point or area where two vehicles make physical contact during a collision
    (discovered in 10 narratives; e.g. "passenger side of the passenger car made contact with the rear
    driver side of the Waymo AV")
  provenance: narrative
  properties: []
- label: Vehicleoccupant
  description: A person inside or operating a vehicle (discovered in 12 narratives; e.g. "Not explicitly
    mentioned in narrative")
  provenance: narrative
  properties: []
- label: Vehicleposition
  description: The state of motion or positioning of a vehicle (discovered in 9 narratives; e.g. "came
    to a stop in a queue of traffic")
  provenance: narrative
  properties: []
- label: Vehiclestate
  description: The operational or physical state of a vehicle at a point in time (discovered in 22 narratives;
    e.g. "came to a stop in a queue of traffic")
  provenance: narrative
  properties: []
relationship_types:
- label: INVOLVES
  description: Incident involves a vehicle (subject or crash partner).
  provenance: column
  properties: []
- label: OPERATED_BY
  description: Vehicle is operated by a company (master_entity).
  provenance: column
  properties: []
- label: REPORTED_BY
  description: Incident was reported to NHTSA by a company.
  provenance: column
  properties: []
- label: OCCURRED_AT
  description: Incident occurred at a location.
  provenance: column
  properties: []
- label: HAD_CONDITION
  description: Environmental condition present during the incident.
  provenance: column
  properties: []
- label: COLLIDED_WITH
  description: Subject vehicle collided with the crash partner.
  provenance: column
  properties: []
- label: ACTIVATED
  description: A vehicle has activated a signal prior to intended movement (discovered in 9 narratives;
    e.g. "its left turn signal activated")
  provenance: narrative
  properties: []
- label: APPROACHED
  description: Vehicle approached a traffic control device (discovered in 25 narratives; e.g. "As the
    Waymo AV approached the intersection with , a heavy truck initiated a wide left turn")
  provenance: narrative
  properties: []
- label: ATTEMPTED_MANEUVER
  description: A vehicle attempting a specific driving maneuver (discovered in 12 narratives; e.g. "preparing
    to make an unprotected left turn")
  provenance: narrative
  properties: []
- label: CAUSED
  description: A driving behavior or decision led to an incident or consequence (discovered in 15 narratives;
    e.g. "chose to maneuver at the curb due to perceived risk from a car in an adjacent lane")
  provenance: narrative
  properties: []
- label: CONTACTED
  description: One vehicle component made contact with another vehicle component (discovered in 55 narratives;
    e.g. "passenger side of the heavy truck then made contact with the passenger side of the Waymo AV")
  provenance: narrative
  properties: []
- label: CONTROLLED_BY
  description: A vehicle is operated by an autonomous driving system (discovered in 29 narratives; e.g.
    "Level 4 ADS was engaged in autonomous mode")
  provenance: narrative
  properties: []
- label: CROSSING
  description: A pedestrian is crossing at a designated crosswalk (discovered in 11 narratives; e.g. "pedestrians
    in a crosswalk")
  provenance: narrative
  properties: []
- label: DISENGAGED
  description: A person disengaged or deactivated a system component (discovered in 8 narratives; e.g.
    "operator disengaged the automated driving system 7.5 seconds prior")
  provenance: narrative
  properties: []
- label: EQUIPPED_WITH
  description: A vehicle is equipped with an autonomous driving system (discovered in 23 narratives; e.g.
    "Waymo AVs Level 4 ADS was engaged")
  provenance: narrative
  properties: []
- label: EXECUTED_MANEUVER
  description: A vehicle performed a specific maneuver (discovered in 13 narratives; e.g. "the Waymo maneuvered
    to the right")
  provenance: narrative
  properties: []
- label: EXITED
  description: A person exited or departed from a vehicle (discovered in 9 narratives; e.g. "passenger
    exited the vehicle")
  provenance: narrative
  properties: []
- label: HAS_STATE
  description: A vehicle exhibits or is in a particular state (discovered in 8 narratives; e.g. "Waymo
    AV was stopped in-lane with hazard lights activated")
  provenance: narrative
  properties: []
- label: IMPACTED_AT
  description: An incident involved contact at a specific location on a vehicle (discovered in 20 narratives;
    e.g. "front of the passenger car made contact with the rear")
  provenance: narrative
  properties: []
- label: IN_LANE
  description: A vehicle is positioned in a specific traffic lane (discovered in 15 narratives; e.g. "traveling
    northbound in the right lane")
  provenance: narrative
  properties: []
- label: INITIATED_MANEUVER
  description: A vehicle begins a driving maneuver (discovered in 15 narratives; e.g. "the pickup truck
    activated its right turn signal while initiating a right turn")
  provenance: narrative
  properties: []
- label: INVOLVED_IN
  description: A vehicle that participated in an incident (discovered in 15 narratives; e.g. "a passenger
    car traveling eastbound on approached the Waymo AV")
  provenance: narrative
  properties: []
- label: MADE_CONTACT_WITH
  description: One vehicle component collided with another (discovered in 75 narratives; e.g. "front of
    the passenger car made contact with the rear of the Waymo AV")
  provenance: narrative
  properties: []
- label: OBEY
  description: A vehicle was operating according to a traffic control signal (discovered in 15 narratives;
    e.g. "turning right from eastbound onto southbound during a green light")
  provenance: narrative
  properties: []
- label: OCCUPIED_BY
  description: A vehicle is occupied by a passenger (discovered in 36 narratives; e.g. "a passenger in
    a passenger car")
  provenance: narrative
  properties: []
- label: OCCUPIES
  description: A person occupies a position in a vehicle (discovered in 23 narratives; e.g. "a test driver
    was present (in the driver's seating position)")
  provenance: narrative
  properties: []
- label: OPERATES_IN
  description: A safety operator controls or manages a vehicle (discovered in 33 narratives; e.g. "The
    safety operator disengaged from autonomous mode")
  provenance: narrative
  properties: []
- label: OPERATING_IN_MODE
  description: The automation level engaged in a vehicle at time of incident (discovered in 71 narratives;
    e.g. "Level 4 ADS was engaged in autonomous mode")
  provenance: narrative
  properties: []
- label: PERFORMED_MANEUVER
  description: A vehicle executed a specific directional or operational action (discovered in 38 narratives;
    e.g. "proceeded forward")
  provenance: narrative
  properties: []
- label: PERFORMS_MANEUVER
  description: A vehicle executes a specific driving maneuver (discovered in 17 narratives; e.g. "van
    proceeded to make a multi-point left turn")
  provenance: narrative
  properties: []
- label: POSITIONED_AT
  description: A vehicle is positioned at or interacting with a traffic control device (discovered in
    13 narratives; e.g. "stopped at a stop sign")
  provenance: narrative
  properties: []
- label: REPORTED_UNDER
  description: An incident was reported under a regulatory framework or requirement (discovered in 12
    narratives; e.g. "reporting this crash under Request No. 2 of Standing General Order 2021-01")
  provenance: narrative
  properties: []
- label: RESPONDED_TO
  description: A vehicle responds to traffic conditions by taking actions like decelerating (discovered
    in 19 narratives; e.g. "traffic light turned yellow")
  provenance: narrative
  properties: []
- label: STOPPED_AT
  description: Vehicle halted due to traffic control signal (discovered in 26 narratives; e.g. "stopped
    in traffic at a red light")
  provenance: narrative
  properties: []
- label: STRUCK
  description: One vehicle or actor strikes another vehicle (discovered in 20 narratives; e.g. "A car
    hit the Avride vehicle from behind")
  provenance: narrative
  properties: []
- label: SUBJECT_TO
  description: Incident must be reported under specific regulatory requirement (discovered in 42 narratives;
    e.g. "Waymo is reporting this crash under Request No. 2 of Standing General Order 2021-01")
  provenance: narrative
  properties: []
- label: SUSTAINED_DAMAGE
  description: A vehicle sustained or experienced damage (discovered in 82 narratives; e.g. "The Waymo
    AV sustained damage")
  provenance: narrative
  properties: []
- label: SUSTAINED_INJURY
  description: A person sustained an injury of a particular type or severity (discovered in 13 narratives;
    e.g. "passenger of the Waymo AV alleged a minor injury")
  provenance: narrative
  properties: []
- label: TRAVELING_IN
  description: Indicates the direction a vehicle was traveling (discovered in 38 narratives; e.g. "traveling
    southeastbound")
  provenance: narrative
  properties: []
- label: WAS_OPERATING_IN_MODE
  description: Describes the automation mode engaged during an incident (discovered in 12 narratives;
    e.g. "Level 4 ADS was engaged in autonomous mode")
  provenance: narrative
  properties: []
- label: YIELDED_TO
  description: A vehicle was yielding or deferring to a traffic control device or regulation (discovered
    in 30 narratives; e.g. "stationary Waymo AV was waiting to turn right, a passenger vehicle traveling
    eastbound behind the Waymo AV attempted to pass")
  provenance: narrative
  properties: []
